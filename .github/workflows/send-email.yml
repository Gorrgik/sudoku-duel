name: Send email code
on:
  schedule:
    - cron: '*/1 * * * *'   # каждую минуту
  workflow_dispatch:
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 -c "
          import os,json,smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from urllib import request
          U=os.environ['SUPABASE_URL']
          K=os.environ['SUPABASE_SERVICE_ROLE_KEY']
          G=os.environ['GMAIL_USER']
          P=os.environ['GMAIL_APP_PASSWORD']
          H={'apikey':K,'Authorization':f'Bearer {K}','Content-Type':'application/json'}
          r=request.Request(U+'/rest/v1/pending_emails?select=id,email,code&order=created_at.asc&limit=10',headers=H)
          rows=json.loads(request.urlopen(r,timeout=10).read())
          print(f'Found {len(rows)}')
          for x in rows:
            try:
              m=MIMEMultipart('alternative')
              m['From']=f'Sudoku Duel <{G}>'
              m['To']=x['email']
              m['Subject']='Код входа в Sudoku Duel'
              h=f'<div style=\"font-family:sans-serif;max-width:480px;margin:0 auto;padding:24px;background:#1e293b;color:#f1f5f9;border-radius:12px;\"><h2 style=\"color:#38bdf8\">Sudoku Duel</h2><p>Код:</p><div style=\"font-size:2.5rem;font-weight:bold;letter-spacing:8px;color:#38bdf8;text-align:center;padding:24px;background:#0f172a;border-radius:8px;margin:16px 0;\">{x[\"code\"]}</div><p style=\"color:#94a3b8;font-size:0.9rem;\">Код 10 минут.</p></div>'
              m.attach(MIMEText(h,'html'))
              with smtplib.SMTP_SSL('smtp.gmail.com',465,timeout=10) as s:
                s.login(G,P)
                s.send_message(m)
              d=request.Request(U+'/rest/v1/pending_emails?id=eq.'+str(x['id']),headers=H,method='DELETE')
              request.urlopen(d,timeout=10).read()
              print('Sent to',x['email'])
            except Exception as e:
              print('Failed',x['email'],e)
          "
