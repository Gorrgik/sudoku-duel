// Восстановление email-сессии при загрузке
function loadEmailSession() {
  try {
    const raw = localStorage.getItem(EMAIL_SESSION_KEY);
    console.log('[SUDOKU] loadEmailSession raw:', raw ? raw.slice(0, 100) : 'NULL');
    if (!raw) return null;
    const sess = JSON.parse(raw);
    if (new Date(sess.expires_at) < new Date()) {
      console.log('[SUDOKU] email session expired, removing');
      localStorage.removeItem(EMAIL_SESSION_KEY);
      return null;
    }
    currentUser = {
      id: 'email_' + sess.email,
      email: sess.email,
      user_metadata: { name: sess.email.split('@')[0], email: sess.email, provider: 'email' }
    };
    myUid = currentUser.id;
    localStorage.setItem('sudoku_uid', myUid);
    console.log('[SUDOKU] email session restored for:', sess.email, 'uid:', myUid);
    // Отложим update — функция определена ниже в коде
    setTimeout(() => { try { updateAuthButton?.(); } catch (_) {} }, 0);
    window.dispatchEvent(new CustomEvent('auth_state_changed'));
    return sess;
  } catch (e) { console.warn('[SUDOKU] loadEmailSession error:', e); return null; }
}

        const arrow = delta > 0 ? '↑' : delta < 0 ? '↓' : '·';
        html += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
          <span><span style="color:${dColor}">${arrow}${delta > 0 ? '+' : ''}${delta}</span> · ${escapeHtml(sourceLabel)}${h.duel_code ? ` · ${escapeHtml(h.duel_code)}` : ''}</span>
          <span style="color:var(--text-dim);font-size:0.75rem">${h.old_rating} → <b style="color:var(--accent)">${h.new_rating}</b> · ${date}</span>
        </div>`;
      });
      html += '</div>';
      box.innerHTML = html;
    }
  } catch(e) {
    document.getElementById('ratingHistoryBox').innerHTML = '<div style="color:red">Ошибка: ' + e.message + '</div>';
  }
  document.getElementById('rhCloseBtn').addEventListener('click', () => {
    showAdminPanel();
    setTimeout(() => document.getElementById('adminTabRatings')?.click(), 50);
  });
}

// Изменить рейтинг вручную
async function editUserRating(uid, name, currentR) {
  // Показываем модалку с инпутом (prompt() может блокироваться на GitHub Pages)
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <div class="duel-modal-step">
      <h2>✏️ Изменить рейтинг</h2>
      <div class="modal-sub">${escapeHtml(name || uid.slice(0,8))} · сейчас: ${currentR}</div>
      <div class="cloud-fields">
        <label>Новый рейтинг</label>
        <input type="number" id="newRatingInput" min="0" value="${currentR}" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--accent);background:var(--bg-soft);color:var(--text);font-size:1.1rem;">
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn primary" id="saveRatingBtn" style="flex:1">💾 Сохранить</button>
        <button class="btn ghost" id="cancelRatingBtn" style="flex:1">Отмена</button>
      </div>
    </div>
  `;
  document.getElementById('modal')?.classList.remove('hidden');
  setTimeout(() => document.getElementById('newRatingInput')?.focus(), 50);

  document.getElementById('cancelRatingBtn').addEventListener('click', () => {
    showAdminPanel();
    setTimeout(() => document.getElementById('adminTabRatings')?.click(), 50);
  });

  document.getElementById('saveRatingBtn').addEventListener('click', async () => {
    const input = document.getElementById('newRatingInput');
    const num = parseInt(input?.value, 10);
    if (isNaN(num) || num < 0) { alert('Введите число >= 0'); return; }
    const oldR = currentR;
    const delta = num - oldR;
    const btn = document.getElementById('saveRatingBtn');
    btn.disabled = true; btn.textContent = '⏳...';
    try {
      // PATCH рейтинга
      await fetch(`${_SB_REST}/duel_ratings?uid=eq.${uid}`, {
        method: 'PATCH', headers: _SB_HDR, mode: 'cors',
        body: JSON.stringify({ rating: num })
      });
      // Запись в историю
      await fetch(`${_SB_REST}/rating_history`, {
        method: 'POST', headers: _SB_HDR, mode: 'cors',
        body: JSON.stringify({ uid, name, old_rating: oldR, new_rating: num, delta, source: 'admin', duel_code: null, created_at: Date.now() })
      });
      alert(`Рейтинг изменён: ${oldR} → ${num}`);
      showAdminPanel();
      setTimeout(() => document.getElementById('adminTabRatings')?.click(), 50);
    } catch(e) {
      alert('Ошибка: ' + e.message);
      btn.disabled = false; btn.textContent = '💾 Сохранить';
    }
  });
}

// ─── Раздел «Дуэли» (комнаты) — мониторинг и удаление ───
async function showAdminRooms() {
  // Останавливаем предыдущий таймер если был
  if (_adminRefreshTimer) { clearInterval(_adminRefreshTimer); _adminRefreshTimer = null; }

  const section = document.getElementById('adminSection');
  const actionsDiv = document.getElementById('adminActions');
  section.innerHTML = '<div style="color:var(--text-dim);padding:12px 0;">Загрузка...</div>';
  actionsDiv.innerHTML = '';

  const render = async () => {
    try {
      // Только колонки нужные для мониторинга (без огромных puzzle/solution/board)
      const sel = 'code,status,player1_name,player1_uid,player1_rating,player1_correct,player1_errors,player2_name,player2_uid,player2_rating,player2_correct,player2_errors,created_at';
      const r = await fetch(`${_SB_REST}/duel_rooms?select=${sel}&order=created_at.desc&limit=50`, { method: 'GET', headers: _SB_HDR, mode: 'cors' });
      const data = await r.json();
      if (!Array.isArray(data) || !data.length) {
        section.innerHTML = '<div style="color:var(--text-dim);padding:12px 0;">Нет активных дуэлей</div>';
        return;
      }

      const now = Date.now();
      const statusColor = s => ({playing:'var(--good)', waiting:'var(--warn)', p1_won:'var(--accent)', p2_won:'var(--accent)', p1_quit:'var(--text-dim)', p2_quit:'var(--text-dim)'}[s] || 'var(--text-dim)');
      const statusLabel = s => ({playing:'играют', waiting:'ожидает', p1_won:'победа p1', p2_won:'победа p2', p1_quit:'p1 вышел', p2_quit:'p2 вышел'}[s] || s);

      let html = '<div style="max-height:380px;overflow-y:auto;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:6px;">';
      data.forEach(room => {
        const age = Math.floor((now - (room.created_at || 0)) / 1000);
        const ageStr = age < 60 ? `${age}с` : age < 3600 ? `${Math.floor(age/60)}м` : `${Math.floor(age/3600)}ч`;
        const p1Name = room.player1_name || '—';
        const p2Name = room.player2_name || '<span style="color:var(--text-dim)">ждёт</span>';
        const p1Score = `${room.player1_correct || 0}✓ / ${room.player1_errors || 0}✗`;
        const p2Score = `${room.player2_correct || 0}✓ / ${room.player2_errors || 0}✗`;
        const p1Rate = room.player1_rating ?? 1000;
        const p2Rate = room.player2_rating ?? 1000;
        html += `
          <div style="border-bottom:1px solid rgba(255,255,255,0.06);padding:8px 4px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
              <span style="font-family:monospace;color:var(--accent);font-weight:bold">${escapeHtml(room.code)}</span>
              <span style="color:${statusColor(room.status)};font-size:11px;font-weight:bold">${statusLabel(room.status)}</span>
              <span style="color:var(--text-dim);font-size:11px">${ageStr}</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;">
              <div>
                <div><b style="color:var(--good)">P1:</b> ${escapeHtml(p1Name)} <span style="color:var(--text-dim)">(${p1Rate})</span></div>
                <div style="color:var(--text-dim);font-size:11px">${p1Score} · ${escapeHtml((room.player1_uid||'').slice(0,8))}</div>
              </div>
              <div>
                <div><b style="color:var(--accent)">P2:</b> ${p2Name} <span style="color:var(--text-dim)">${room.player2_uid ? `(${p2Rate})` : ''}</span></div>
                <div style="color:var(--text-dim);font-size:11px">${room.player2_uid ? p2Score + ' · ' + escapeHtml((room.player2_uid||'').slice(0,8)) : ''}</div>
              </div>
            </div>
            <div style="display:flex;gap:6px;margin-top:6px;">
              <button class="btn ghost admin-room-view" data-code="${escapeHtml(room.code)}" style="flex:1;padding:4px;font-size:11px">👁 Открыть доску</button>
              <button class="btn ghost admin-room-del" data-code="${escapeHtml(room.code)}" style="flex:1;padding:4px;font-size:11px;color:var(--warn)">🗑 Удалить</button>
            </div>
          </div>
        `;
      });
      html += '</div>';
      html += `<div style="color:var(--text-dim);font-size:11px;margin-top:6px;text-align:right">показано ${data.length} последних</div>`;
      section.innerHTML = html;

      // Удаление одной комнаты
      section.querySelectorAll('.admin-room-del').forEach(btn => {
        btn.addEventListener('click', async () => {
          const code = btn.dataset.code;
          if (!confirm(`Удалить комнату ${code}?`)) return;
          btn.disabled = true; btn.textContent = '⏳...';
          const dr = await fetch(`${_SB_REST}/duel_rooms?code=eq.${code}`, { method: 'DELETE', headers: _SB_HDR, mode: 'cors' });
          if (dr.ok) { render(); }
          else { btn.disabled = false; btn.textContent = '🗑 Удалить'; alert('Ошибка: ' + dr.status); }
        });
      });

      // Открыть доску (read-only просмотр)
      section.querySelectorAll('.admin-room-view').forEach(btn => {
        btn.addEventListener('click', () => {
          const code = btn.dataset.code;
          openAdminBoard(code);
        });
      });
    } catch(e) {
      section.innerHTML = '<div style="color:red;padding:12px 0;">Ошибка: ' + e.message + '</div>';
    }
  };

  await render();

  // Автообновление убрано — пользователь жмёт «Обновить» вручную

  // Кнопки в actionsDiv
  const refreshBtn = document.createElement('button');
  refreshBtn.className = 'btn ghost';
  refreshBtn.style.width = '100%';
  refreshBtn.style.textAlign = 'left';
  refreshBtn.textContent = '🔄 Обновить сейчас';
  refreshBtn.addEventListener('click', render);
  actionsDiv.appendChild(refreshBtn);

  const cleanStale = document.createElement('button');
  cleanStale.className = 'btn ghost';
  cleanStale.style.width = '100%';
  cleanStale.style.textAlign = 'left';
  cleanStale.textContent = '🧹 Удалить все waiting (>5м) и finished';
  cleanStale.addEventListener('click', async () => {
    if (!confirm('Удалить все комнаты со статусом waiting старше 5 минут И все завершённые?')) return;
    cleanStale.disabled = true; cleanStale.textContent = '⏳...';
    const fiveMinAgo = Date.now() - 5 * 60 * 1000;
    // Удалить старые waiting
    const r1 = await fetch(`${_SB_REST}/duel_rooms?status=eq.waiting&created_at=lt.${fiveMinAgo}`, { method: 'DELETE', headers: _SB_HDR, mode: 'cors' });
    // Удалить завершённые
    const r2 = await fetch(`${_SB_REST}/duel_rooms?status=in.(p1_won,p2_won,p1_quit,p2_quit)`, { method: 'DELETE', headers: _SB_HDR, mode: 'cors' });
    alert(`waiting: ${r1.ok ? 'OK' : r1.status}, finished: ${r2.ok ? 'OK' : r2.status}`);
    render();
    cleanStale.disabled = false; cleanStale.textContent = '🧹 Удалить все waiting (>5м) и finished';
  });
  actionsDiv.appendChild(cleanStale);
}

// Останавливаем таймер автообновления при закрытии модалки
const _origHideModal = window.hideModal;
window.hideModal = function() {
  if (_adminRefreshTimer) { clearInterval(_adminRefreshTimer); _adminRefreshTimer = null; }
  return _origHideModal ? _origHideModal.apply(this, arguments) : null;
};

// ─── Просмотр доски дуэли (read-only спектатор) ───
async function openAdminBoard(code) {
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <div class="duel-modal-step">
      <h2>👁 Доска ${escapeHtml(code)}</h2>
      <div class="modal-sub">Загрузка...</div>
      <div id="adminBoardBox" style="margin:12px 0;"></div>
      <div style="margin-top:12px;display:flex;gap:8px;">
        <button class="btn ghost" id="adminBoardRefresh" style="flex:1">🔄 Обновить</button>
        <button class="btn ghost" id="adminBoardClose" style="flex:1">← К списку</button>
      </div>
    </div>
  `;
  document.getElementById('modal')?.classList.remove('hidden');

  const renderBoard = (room) => {
    const box = document.getElementById('adminBoardBox');
    const puzzle = room.puzzle || [];
    const board = room.board || puzzle;
    const solution = room.solution || [];
    const subs = modal.querySelector('.modal-sub');
    if (subs) subs.innerHTML = `<b>${escapeHtml(room.player1_name||'—')}</b> vs <b>${escapeHtml(room.player2_name||'ждёт')}</b> · статус: ${room.status} · <span style="color:var(--accent)">P1 ${room.player1_correct||0}✓/${room.player1_errors||0}✗</span> · <span style="color:var(--good)">P2 ${room.player2_correct||0}✓/${room.player2_errors||0}✗</span>`;

    if (!board.length) {
      box.innerHTML = '<div style="color:var(--text-dim);padding:20px 0;">Доска недоступна</div>';
      return;
    }

    // Сетка 9x9, цифры из board, оригинал подсвечен, ходы игроков — обычные
    let html = '<div style="display:inline-grid;grid-template-columns:repeat(9,36px);border:2px solid var(--accent);background:var(--accent);gap:1px;">';
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        const isOriginal = puzzle[r] && puzzle[r][c] !== 0;
        const v = board[r] && board[r][c];
        const isCorrect = v && solution[r] && solution[r][c] === v;
        const isWrong = v && solution[r] && solution[r][c] !== v;
        let bg = 'var(--panel)';
        let color = 'var(--text)';
        if (isOriginal) { bg = 'var(--bg-soft)'; color = 'var(--text-dim)'; }
        else if (isCorrect) { bg = 'var(--bg-soft)'; color = 'var(--good)'; }
        else if (isWrong) { bg = 'var(--bg-soft)'; color = 'var(--warn)'; }
        // толстые границы 3x3
        const borderTop = r % 3 === 0 ? 'border-top:2px solid var(--accent);' : '';
        const borderLeft = c % 3 === 0 ? 'border-left:2px solid var(--accent);' : '';
        const borderRight = c === 8 ? '' : '';
        const borderBottom = r === 8 ? '' : '';
        html += `<div style="${borderTop}${borderLeft}${borderRight}${borderBottom}width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:${isOriginal?'bold':'normal'};background:${bg};color:${color};font-size:16px;">${v || ''}</div>`;
      }
    }
    html += '</div>';
    html += `<div style="margin-top:8px;font-size:11px;color:var(--text-dim);display:flex;gap:12px;flex-wrap:wrap;">
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--bg-soft);border:1px solid var(--text-dim);vertical-align:middle"></span> оригинал</span>
      <span><span style="color:var(--good)">█</span> правильный ход</span>
      <span><span style="color:var(--warn)">█</span> ошибка</span>
    </div>`;
    box.innerHTML = html;
  };

  const loadBoard = async () => {
    try {
      const r = await fetch(`${_SB_REST}/duel_rooms?code=eq.${code}&limit=1`, { method: 'GET', headers: _SB_HDR, mode: 'cors' });
      const data = await r.json();
      if (!data || !data[0]) {
        document.getElementById('adminBoardBox').innerHTML = '<div style="color:red">Комната не найдена</div>';
        return;
      }
      renderBoard(data[0]);
    } catch(e) {
      document.getElementById('adminBoardBox').innerHTML = '<div style="color:red">Ошибка: ' + e.message + '</div>';
    }
  };

  await loadBoard();
  document.getElementById('adminBoardRefresh').addEventListener('click', loadBoard);
  document.getElementById('adminBoardClose').addEventListener('click', () => {
    // Возврат к списку — перерисовываем админ-панель
    showAdminPanel();
    // сразу переключаемся на вкладку Дуэли
    setTimeout(() => document.getElementById('adminTabRooms')?.click(), 50);
  });
}

// ─── Раздел «Мониторинг»: онлайн, пользователи, активные дуэли ───
async function showAdminMonitor() {
  if (_adminRefreshTimer) { clearInterval(_adminRefreshTimer); _adminRefreshTimer = null; }

  const section = document.getElementById('adminSection');
  const actionsDiv = document.getElementById('adminActions');
  section.innerHTML = '<div style="color:var(--text-dim);padding:12px 0;">Загрузка...</div>';
  actionsDiv.innerHTML = '';

  // Под-вкладки внутри Мониторинга
  let currentSubTab = 'duels';
  const subTabs = [
    { id: 'duels', label: '📋 Дуэли' },
    { id: 'registered', label: '👥 Зарег.' },
    { id: 'online', label: '🟢 Онлайн' },
    { id: 'anon', label: '👤 Аноны' },
  ];
  const renderSubTabs = () => {
    let html = '<div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;">';
    subTabs.forEach(t => {
      const active = t.id === currentSubTab;
      html += `<button class="btn ${active ? 'primary' : 'ghost'}" data-sub="${t.id}" style="padding:6px 10px;font-size:0.8rem;flex:1;min-width:80px">${t.label}</button>`;
    });
    html += '</div>';
    return html;
  };

  const render = async () => {
    try {
      // 1. Активные дуэли
      const roomsR = await fetch(`${_SB_REST}/duel_rooms?select=code,status,player1_name,player1_uid,player1_rating,player1_correct,player1_errors,player2_name,player2_uid,player2_rating,player2_correct,player2_errors,created_at&order=created_at.desc&limit=100`, { method: 'GET', headers: _SB_HDR, mode: 'cors' });
      const rooms = await roomsR.json();

      // 2. Залогиненные пользователи (uid с дефисами)
      const cutoff = Date.now() - 30000;
      const usersR = await fetch(`${_SB_REST}/duel_ratings?select=uid,name,rating,games,wins,last_seen&uid=like.*-*&order=rating.desc&limit=200`, { method: 'GET', headers: _SB_HDR, mode: 'cors' });
      const users = await usersR.json();

      // 3. Анонимные пользователи (uid БЕЗ дефисов — старая 16-символьная запись)
      const anonR = await fetch(`${_SB_REST}/duel_ratings?select=uid,name,rating,games,wins,last_seen&uid=not.like.*-*&order=last_seen.desc&limit=200`, { method: 'GET', headers: _SB_HDR, mode: 'cors' });
      const anonUsers = anonR.ok ? await anonR.json() : [];

      // 4. Matchmaking
      const queueR = await fetch(`${_SB_REST}/matchmaking?select=uid,name,rating,created_at&status=eq.waiting`, { method: 'GET', headers: _SB_HDR, mode: 'cors' });
      const queue = await queueR.json();

      const playing = rooms.filter(r => r.status === 'playing');
      const waiting = rooms.filter(r => r.status === 'waiting');
      const finished = rooms.filter(r => ['p1_won','p2_won','p1_quit','p2_quit'].includes(r.status));
      const onlineUsers = (users || []).filter(u => u.last_seen && u.last_seen > cutoff);
      const onlineAnon = (anonUsers || []).filter(u => u.last_seen && u.last_seen > cutoff);
      const onlineCount = onlineUsers.length + onlineAnon.length;

      const statusColor = s => ({playing:'var(--good)', waiting:'var(--warn)', p1_won:'var(--accent)', p2_won:'var(--accent)', p1_quit:'var(--text-dim)', p2_quit:'var(--text-dim)'}[s] || 'var(--text-dim)');
      const statusLabel = s => ({playing:'🎮 играют', waiting:'⏳ ожидает', p1_won:'✅ победа p1', p2_won:'✅ победа p2', p1_quit:'🚪 p1 вышел', p2_quit:'🚪 p2 вышел'}[s] || s);

      // Плашка со статистикой + под-вкладки
      let html = `
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;">
          <div style="background:var(--bg-soft);padding:8px;border-radius:8px;text-align:center;">
            <div style="font-size:1.4rem;font-weight:bold;color:var(--good)">${onlineCount}</div>
            <div style="font-size:0.7rem;color:var(--text-dim)">Онлайн</div>
          </div>
          <div style="background:var(--bg-soft);padding:8px;border-radius:8px;text-align:center;">
            <div style="font-size:1.4rem;font-weight:bold;color:var(--accent)">${playing.length}</div>
            <div style="font-size:0.7rem;color:var(--text-dim)">Дуэлей</div>
          </div>
          <div style="background:var(--bg-soft);padding:8px;border-radius:8px;text-align:center;">
            <div style="font-size:1.4rem;font-weight:bold;color:var(--warn)">${queue.length}</div>
            <div style="font-size:0.7rem;color:var(--text-dim)">В очереди</div>
          </div>
        </div>
      `;
      html += renderSubTabs();

      // Контент в зависимости от под-вкладки
      if (currentSubTab === 'duels') {
        html += `<div style="font-weight:bold;margin:8px 0 6px;">📋 Активные дуэли (${playing.length + waiting.length})</div>`;
        html += '<div style="max-height:280px;overflow-y:auto;">';
        if (playing.length === 0 && waiting.length === 0) {
          html += '<div style="color:var(--text-dim);padding:8px 0;">Нет активных дуэлей</div>';
        } else {
          [...playing, ...waiting].slice(0, 20).forEach(room => {
            const p1Name = room.player1_name || '—';
            const p2Name = room.player2_name || '—';
            html += `
              <div style="background:var(--bg-soft);padding:8px 10px;border-radius:6px;margin-bottom:6px;font-size:0.85rem;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                  <span style="font-family:monospace;color:var(--accent);font-weight:bold">${escapeHtml(room.code)}</span>
                  <span style="color:${statusColor(room.status)};font-size:0.75rem">${statusLabel(room.status)}</span>
                </div>
                <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;">
                  <div>
                    <b style="color:var(--good)">${escapeHtml(p1Name)}</b>
                    <span style="color:var(--text-dim);font-size:0.75rem"> ${room.player1_rating || 1000}</span>
                    <span style="color:var(--text-dim);font-size:0.75rem"> · ${room.player1_correct||0}✓ ${room.player1_errors||0}✗</span>
                  </div>
                  <span style="color:var(--text-dim)">vs</span>
                  <div>
                    <b style="color:var(--accent)">${escapeHtml(p2Name)}</b>
                    <span style="color:var(--text-dim);font-size:0.75rem"> ${room.player2_rating || 1000}</span>
                    <span style="color:var(--text-dim);font-size:0.75rem"> · ${room.player2_correct||0}✓ ${room.player2_errors||0}✗</span>
                  </div>
                </div>
                <div style="display:flex;gap:4px;margin-top:6px;">
                  <button class="btn ghost admin-mon-view" data-code="${escapeHtml(room.code)}" style="flex:1;padding:3px;font-size:0.75rem">👁 Доска</button>
                  <button class="btn ghost admin-mon-winner" data-code="${escapeHtml(room.code)}" style="flex:1;padding:3px;font-size:0.75rem;color:var(--good)">🏆 Победитель</button>
                  <button class="btn ghost admin-mon-del" data-code="${escapeHtml(room.code)}" style="flex:0;padding:3px 8px;font-size:0.75rem;color:var(--warn)">🗑</button>
                </div>
              </div>
            `;
          });
        }

// ─── Объявить победителя дуэли (админ) ───
async function declareWinner(code) {
  try {
    const r = await fetch(`${_SB_REST}/duel_rooms?code=eq.${code}&limit=1`, { method: 'GET', headers: _SB_HDR, mode: 'cors' });
    const data = await r.json();
    if (!data || !data[0]) { alert('Комната не найдена'); return; }
    const room = data[0];
    if (room.status !== 'playing') { alert('Дуэль уже завершена (' + room.status + ')'); return; }

    const p1Name = room.player1_name || 'P1';
    const p2Name = room.player2_name || 'P2';
    const p1Score = `${room.player1_correct||0}✓/${room.player1_errors||0}✗`;
    const p2Score = `${room.player2_correct||0}✓/${room.player2_errors||0}✗`;
    const p1Rate = room.player1_rating || 1000;
    const p2Rate = room.player2_rating || 1000;

    const modal = document.getElementById('modalContent');
    modal.innerHTML = `
      <div class="duel-modal-step">
        <h2>🏆 Объявить победителя</h2>
        <div class="modal-sub">Код: ${escapeHtml(code)}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;">
          <button class="btn primary" id="declareP1" style="padding:16px 8px;line-height:1.4;">
            <div style="font-size:1.1rem;font-weight:bold">🏆 P1</div>
            <div style="font-size:0.85rem;margin-top:4px">${escapeHtml(p1Name)}</div>
            <div style="font-size:0.75rem;color:var(--text-dim);margin-top:2px">рейтинг ${p1Rate} · ${p1Score}</div>
          </button>
          <button class="btn primary" id="declareP2" style="padding:16px 8px;line-height:1.4;">
            <div style="font-size:1.1rem;font-weight:bold">🏆 P2</div>
            <div style="font-size:0.85rem;margin-top:4px">${escapeHtml(p2Name)}</div>
            <div style="font-size:0.75rem;color:var(--text-dim);margin-top:2px">рейтинг ${p2Rate} · ${p2Score}</div>
          </button>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn ghost" id="declareDraw" style="flex:1">🤝 Ничья (без рейтинга)</button>
          <button class="btn ghost" id="declareCancel" style="flex:1">← Назад</button>
        </div>
      </div>
    `;
    document.getElementById('modal')?.classList.remove('hidden');

    document.getElementById('declareP1').addEventListener('click', () => applyWinner(code, 'p1_won'));
    document.getElementById('declareP2').addEventListener('click', () => applyWinner(code, 'p2_won'));
    document.getElementById('declareDraw').addEventListener('click', () => applyWinner(code, 'draw'));
    document.getElementById('declareCancel').addEventListener('click', () => {
      showAdminPanel();
      setTimeout(() => document.getElementById('adminTabMonitor')?.click(), 50);
    });
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function applyWinner(code, result) {
  try {
    // Обновляем статус комнаты
    const status = result === 'draw' ? 'draw' : result;
    const dr = await fetch(`${_SB_REST}/duel_rooms?code=eq.${code}`, {
      method: 'PATCH', headers: _SB_HDR, mode: 'cors',
      body: JSON.stringify({ status })
    });
    if (!dr.ok) { alert('Не удалось обновить комнату: ' + dr.status); return; }

    // Если есть победитель — обновляем рейтинги
    if (result === 'p1_won' || result === 'p2_won') {
      const r = await fetch(`${_SB_REST}/duel_rooms?code=eq.${code}&limit=1`, { method: 'GET', headers: _SB_HDR, mode: 'cors' });
      const data = await r.json();
      const room = data[0];
      const myR = result === 'p1_won' ? (room.player1_rating || 1000) : (room.player2_rating || 1000);
      const oppR = result === 'p1_won' ? (room.player2_rating || 1000) : (room.player1_rating || 1000);
      const K = 30;
      const expected = 1 / (1 + Math.pow(10, (oppR - myR) / 400));
      const delta = Math.round(K * (1 - expected));

      const winnerUid = result === 'p1_won' ? room.player1_uid : room.player2_uid;
      const loserUid = result === 'p1_won' ? room.player2_uid : room.player1_uid;
      const winnerName = result === 'p1_won' ? room.player1_name : room.player2_name;
      const loserName = result === 'p1_won' ? room.player2_name : room.player1_name;

      // Админ сам обновляет рейтинги (так как он объявил победителя)
      await updateUserRating(winnerUid, winnerName, delta);
      await updateUserRating(loserUid, loserName, -delta);
      alert(`Победитель: ${winnerName} (+${delta})\nПроигравший: ${loserName} (-${delta})`);
    } else {
      alert('Ничья — рейтинги не изменены');
    }
    showAdminPanel();
    setTimeout(() => document.getElementById('adminTabMonitor')?.click(), 50);
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function updateUserRating(uid, name, delta) {
  if (!uid) return;
  const r = await fetch(`${_SB_REST}/duel_ratings?uid=eq.${uid}&limit=1`, { method: 'GET', headers: _SB_HDR, mode: 'cors' });
  const data = await r.json();
  const cur = data && data[0];
  const oldR = cur ? Number(cur.rating || 1000) : 1000;
  const newR = Math.max(0, oldR + delta);
  const payload = { uid, rating: newR, name: name || cur?.name || 'Игрок' };
  if (cur) {
    payload.games = (cur.games || 0) + 1;
    if (delta > 0) payload.wins = (cur.wins || 0) + 1;
  }
  await fetch(`${_SB_REST}/duel_ratings`, {
    method: 'POST', headers: { ..._SB_HDR, 'Prefer': 'resolution=merge-duplicates' }, mode: 'cors',
    body: JSON.stringify(payload)
  });
}

// Утилиты
function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Модалка «Выбери свой ник» — показывается после регистрации/первого входа
async function showChooseNicknameModal() {
  const user = window.FB?.getCurrentUser();
  if (!user) return;
  const email = user.email || '';
  const defaultName = (user.user_metadata?.name || email.split('@')[0] || '').trim();
  const modal = $('modalContent');
  modal.innerHTML = `
    <h2>👋 Добро пожаловать!</h2>
    <div style="color:var(--text-dim);font-size:0.88rem;margin-bottom:4px;">Вошёл как:</div>
    <div style="background:var(--bg-soft);padding:8px 12px;border-radius:8px;margin-bottom:16px;font-family:monospace;font-size:0.9rem;">${escapeHtml(email)}</div>
    <div style="margin-bottom:8px;font-weight:600;">Выбери свой ник (2-20 символов):</div>
    <input type="text" id="chooseNickInput" maxlength="20" value="${escapeHtml(defaultName)}" style="width:100%;padding:12px;border-radius:8px;border:2px solid var(--accent);background:var(--bg-soft);color:var(--text);font-size:1rem;margin-bottom:8px;">
    <div id="chooseNickStatus" style="min-height:20px;margin-bottom:12px;font-size:0.85rem;"></div>
    <button class="btn primary" id="chooseNickSaveBtn" style="width:100%">💾 Сохранить ник</button>
  `;
  showModal();

  const input = $('chooseNickInput');
  const status = $('chooseNickStatus');
  const saveBtn = $('chooseNickSaveBtn');

  // Live-проверка уникальности
  let checkTimer = null;
  input.addEventListener('input', () => {
    clearTimeout(checkTimer);
    const v = input.value.trim();
    status.textContent = '';
    saveBtn.disabled = false;
    if (v.length < 2) { status.innerHTML = '<span style="color:var(--text-dim)">Минимум 2 символа</span>'; saveBtn.disabled = true; return; }
    if (v.length > 20) { status.innerHTML = '<span style="color:var(--warn)">Максимум 20</span>'; saveBtn.disabled = true; return; }
    status.innerHTML = '<span style="color:var(--text-dim)">⏳ Проверяю...</span>';
    checkTimer = setTimeout(async () => {
      try {
        const r = await fetch(`${_SB_REST}/users?name=ilike.${encodeURIComponent(v)}&select=uid&limit=1`, {
          method: 'GET', headers: _SB_HDR, mode: 'cors'
        });
        if (r.ok) {
          const arr = await r.json();
          if (arr.length > 0 && arr[0].uid !== user.id) {
            status.innerHTML = `<span style="color:var(--warn)">❌ Ник «${escapeHtml(v)}» уже занят</span>`;
            saveBtn.disabled = true;
          } else {
            status.innerHTML = `<span style="color:var(--good)">✅ Свободен</span>`;
            saveBtn.disabled = false;
          }
        }
      } catch (e) {
        status.innerHTML = '<span style="color:var(--text-dim)">Не удалось проверить</span>';
      }
    }, 400);
  });

  // Триггерим первую проверку
  input.dispatchEvent(new Event('input'));

  saveBtn.addEventListener('click', async () => {
    const newName = input.value.trim();
    if (newName.length < 2 || newName.length > 20) return;
    saveBtn.disabled = true;
    saveBtn.textContent = '⏳ Сохраняю...';
    const myUid = window.FB.getMyUid();
    // 1) Supabase user_metadata
    try { await supabase.auth.updateUser({ data: { name: newName } }); } catch(e) {}
    // 2) users (тут БРОСИТ ошибку если constraint нарушен)
    try {
      const r = await fetch(`${_SB_REST}/users?uid=eq.${myUid}`, {
        method: 'PATCH', headers: _SB_HDR, mode: 'cors',
        body: JSON.stringify({ name: newName })
      });
      if (!r.ok) {
        const errTxt = await r.text();
        if (/duplicate|unique/i.test(errTxt)) {
          saveBtn.disabled = false; saveBtn.textContent = '💾 Сохранить ник';
          status.innerHTML = `<span style="color:var(--warn)">❌ Сервер отклонил: ник занят</span>`;
          return;
        }
      }
    } catch(e) {}
    // 3) localStorage
    window.FB.setMyName(newName);
    // 4) Все таблицы по email
    await updateNameEverywhere(myUid, email, newName);
    hideModal();
    updateAuthButton();
    alert('✅ Ник сохранён: ' + newName);
  });
}

document.addEventListener('keydown', e => {
  if (!state || !state.started) return;
  if (e.target.tagName === 'INPUT') return;

  if (!selectedCell) {
    return;
  }

  let { r, c } = selectedCell;

  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    e.preventDefault();
    if (e.key === 'ArrowUp' && r > 0) r--;
    if (e.key === 'ArrowDown' && r < 8) r++;
    if (e.key === 'ArrowLeft' && c > 0) c--;
    if (e.key === 'ArrowRight' && c < 8) c++;
    selectCell(r, c);
  } else if (['1','2','3','4','5','6','7','8','9'].includes(e.key)) {
    placeNumber(parseInt(e.key, 10));
  } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') {
    playClick();
    placeNumber(0);
  }
});

let duelCode = null;
let duelUnsub = null;
let duelBoard = null;       // 9×9 — общая доска
let duelMyLives = 3;
let duelOppLives = 3;
let duelMyCorrect = 0;
let duelOppCorrect = 0;
let duelPlayer = null;       // 'p1' или 'p2'
let duelOppUid = null;
let duelOppName = null;
let duelPuzzle = null;
let duelSolution = null;
let duelSelected = null;
let duelMyRating = 1000;
let duelOppRating = 1000;
let duelPencilMode = false;
let duelNotes = null;        // 9×9 массив массивов кандидатов

const HEART = '❤️';
const HEART_EMPTY = '🖤';

function duelLivesHTML(lives) {

const myRtg = isP1 ? room.player1_rating : room.player2_rating;

function renderDuelBoard() {
  const board = $('duelBoard');
  board.innerHTML = '';
  if (!duelPuzzle || !duelBoard) { console.log('[SUDOKU] renderDuelBoard: нет данных, пропуск'); return; }
  console.log('[SUDOKU] renderDuelBoard: fullBoard=', duelBoard.map(r=>r.join('')).join('|'), 'player=', duelPlayer);
  // Инициализируем массив заметок под дуэль, если ещё нет
  if (!duelNotes) duelNotes = Array.from({length:9}, () => Array.from({length:9}, () => []));
  renderNumPad(); // обновить счётчики оставшихся цифр
  const isP1 = duelPlayer === 'p1';
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (r % 3 === 0) cell.classList.add('bt');
      if (r === 8) cell.classList.add('bb');
      if (c % 3 === 0) cell.classList.add('bl');
      if (c === 8) cell.classList.add('br');

      const isFixed = duelPuzzle[r][c] !== 0;
      const val = duelBoard ? duelBoard[r][c] : 0;

      if (isFixed) {
        cell.classList.add('fixed');
        cell.textContent = duelPuzzle[r][c];
      } else {
        // Не фиксированная — можно кликать всегда (даже если уже заполнена)
        cell.addEventListener('click', () => duelSelectCell(r, c));
        if (val !== 0) {
          const isWrong = _duelFirstMoveDone && duelSolution && duelSolution[r][c] !== val;
          cell.classList.add(isWrong ? 'error' : 'user');
          cell.textContent = val;
        } else if (duelNotes && duelNotes[r] && duelNotes[r][c] && duelNotes[r][c].length) {
          // Кандидаты (заметки карандаша)
          cell.classList.add('notes');
          cell.innerHTML = renderDuelNotesHTML(duelNotes[r][c]);
        }
      }

      if (duelSelected && duelSelected.r === r && duelSelected.c === c) {
        cell.style.background = 'var(--cell-selected-bg)';
        cell.style.boxShadow = 'inset 0 0 0 3px var(--accent)';
      }

      board.appendChild(cell);
    }
  }
  highlightDuelSelection();
}

function duelSelectCell(r, c) {
  // фиксированная из puzzle — нельзя трогать
  if (duelPuzzle && duelPuzzle[r][c] !== 0) return;
  // уже заполнена верно другим игроком — заблокирована
  if (duelBoard && duelBoard[r][c] !== 0 && duelSolution && duelSolution[r][c] === duelBoard[r][c]) return;
  duelSelected = { r, c };
  playClick();
  renderDuelBoard();
}

function highlightDuelSelection() {
  const board = $('duelBoard');
  if (!board) return;
  // сначала убираем все highlights
  for (let i = 0; i < 81; i++) board.children[i] && board.children[i].classList.remove('highlight');
  if (!duelSelected) return;
  const { r, c } = duelSelected;
  for (let i = 0; i < 81; i++) {
    const cell = board.children[i];
    const cr = Math.floor(i / 9), cc = i % 9;
    if (cr === r || cc === c || (Math.floor(cr/3)===Math.floor(r/3) && Math.floor(cc/3)===Math.floor(c/3))) {
      if (!(cr===r && cc===c)) cell.classList.add('highlight');
    }
  }
}

// Обновляет DOM доски in-place — НЕ пересоздаёт элементы, чтобы event listeners не терялись
function syncDuelBoardDOM() {
  const board = $('duelBoard');
  if (!board || !duelBoard) { console.log('[SUDOKU] syncDuelBoardDOM: пропуск, нет board или duelSolution'); return; }
  console.log('[SUDOKU] syncDuelBoardDOM: board=', duelBoard.map(r=>r.join('')).join('|'), 'solution=', duelSolution ? 'есть' : 'null');
  const isP1 = duelPlayer === 'p1';
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      const i = r * 9 + c;
      const cell = board.children[i];
      if (!cell) continue;
      const isFixed = duelPuzzle && duelPuzzle[r][c] !== 0;
      if (isFixed) continue;
      const val = duelBoard[r][c];
      if (val === 0) {
        cell.classList.remove('error', 'user');
        cell.textContent = '';
        // Если есть заметки — отобразить их
        if (duelNotes && duelNotes[r] && duelNotes[r][c] && duelNotes[r][c].length) {
          cell.innerHTML = renderDuelNotesHTML(duelNotes[r][c]);
        }
        continue;
      }
      // Свои ошибки — красным, свои верные — синим, чужие ходы — обычным синим
      if (duelSolution[r][c] === val) {
        cell.classList.remove('error');
        cell.classList.add('user');
      } else {
        // Неверная цифра — красная только если это свой ход (был до sync)
        // После первого своего хода новые ошибки тоже красные
        cell.classList.add('error');
        cell.classList.remove('user');
      }
      cell.textContent = val;
      if (duelSelected && duelSelected.r === r && duelSelected.c === c) {
        cell.style.background = 'var(--cell-selected-bg)';
        cell.style.boxShadow = 'inset 0 0 0 3px var(--accent)';
      } else {
        cell.style.background = '';
        cell.style.boxShadow = '';
      }
    }
  }
  highlightDuelSelection();
  // Обновить счётчики "осталось" в numpad дуэли
  for (let nn = 1; nn <= 9; nn++) {
    const b = document.querySelector(`#duelNumPad .num-btn[data-n="${nn}"]`);
    if (b) updateDuelNumRemaining(nn, b);
  }
}

function duelPlaceNumber(n) {
  if (!duelSelected || !duelBoard) return;
  const { r, c } = duelSelected;

  playClick();

  if (n === 0) {
    // стереть (только свои ошибки + заметки)
    const fixed = duelPuzzle && duelPuzzle[r][c] !== 0;
    if (!fixed) {
      // стираем заметки
      if (duelNotes && duelNotes[r] && duelNotes[r][c] && duelNotes[r][c].length) {
        duelNotes[r][c] = [];
        duelSelected = null;
        renderDuelBoard();
        renderNumPad();
        return;
      }
      if (duelBoard[r][c] !== 0) {
        duelBoard[r][c] = 0;
        duelSelected = null;
        renderDuelBoard();
        renderNumPad();
      }
    }
    return;
  }

  // === РЕЖИМ КАРАНДАША В ДУЭЛИ ===
  if (duelPencilMode && n >= 1 && n <= 9) {
    const fixed = duelPuzzle && duelPuzzle[r][c] !== 0;
    const filled = duelBoard[r][c] !== 0;
    if (fixed || filled) return; // заметки только в пустых клетках
    if (!duelNotes) duelNotes = Array.from({length:9}, () => Array.from({length:9}, () => []));
    const notes = duelNotes[r][c];
    const idx = notes.indexOf(n);
    if (idx >= 0) notes.splice(idx, 1);
    else notes.push(n);
    renderDuelBoard();
    renderNumPad();
    return;
  }

  _duelFirstMoveDone = true;
  const isCorrect = duelSolution[r][c] === n;

  if (!isCorrect) {
    duelMyLives--;
    flashError();
    playWrong();
    // неверный ответ — всё равно отправляем и рисуем на доске
    duelBoard[r][c] = n;
    // Чистим заметки — клетка теперь занята
    if (duelNotes && duelNotes[r]) duelNotes[r][c] = [];
    window.FB.sendDuelMove(duelCode, r, c, n, false);
  } else {
    duelMyCorrect++;
    flashCorrect();
    playCorrect();
    duelBoard[r][c] = n;
    // Чистим заметки — цифра поставлена
    if (duelNotes && duelNotes[r]) duelNotes[r][c] = [];
    window.FB.sendDuelMove(duelCode, r, c, n, true);
  }

  duelSelected = null;
  renderDuelBoard();
  renderNumPad();
  // Обновить numpad дуэли (счётчики оставшихся)
  for (let nn = 1; nn <= 9; nn++) {
    const b = document.querySelector(`#duelNumPad .num-btn[data-n="${nn}"]`);
    if (b) updateDuelNumRemaining(nn, b);
  }

  // Проверка: победил или потерял все жизни
  if (duelMyLives <= 0) {
    duelMyLives = 0;
    window.FB.duelLose(duelCode);
    return;
  }
  if (checkDuelWin()) {
    endDuelGame('win');
  }
}

function checkDuelWin() {
  if (!duelBoard) return false;
  for (let r = 0; r < 9; r++)
    for (let c = 0; c < 9; c++)
      if (duelBoard[r][c] !== duelSolution[r][c]) return false;
  return true;
}

async function endDuelGame(result) {
  if (_duelEnded) { console.log('[SUDOKU] endDuelGame: уже завершено, пропуск'); return; }
  _duelEnded = true;
  console.log('[SUDOKU] endDuelGame START: result=', result,
    'duelOppUid=', duelOppUid, 'duelOppName=', duelOppName,
    'duelMyRating=', duelMyRating, 'duelOppRating=', duelOppRating);

  // ВАЖНО: сохраняем значения ДО duelCleanup, иначе он сбросит duelOppUid в null
  const oppUid = duelOppUid;
  const oppName = duelOppName;
  const myR = duelMyRating;
  const oppR = duelOppRating;
  const isWin = (result === 'win' || result === 'quit_win');
  console.log('[SUDOKU] endDuelGame: сохранено oppUid=', oppUid, 'oppName=', oppName,
    'myR=', myR, 'oppR=', oppR, 'isWin=', isWin);

  if (duelUnsub) { duelUnsub(); duelUnsub = null; }
  stopDuelTimer();
  duelCleanup(); // скрываем duel screen

  // ELO формула: K=20 (или 30 для быстрой сходимости)
  // Expected = 1 / (1 + 10^((opp - me)/400))
  // Delta = round(K * (actual - expected))
  // Победа над сильным: больше +. Поражение слабому: больше -.
  // Поражение сильному: меньше -. Победа над слабым: меньше +.
  const K = 30;
  const expected = 1 / (1 + Math.pow(10, (oppR - myR) / 400));
  const actual = isWin ? 1 : 0;
  const delta = Math.round(K * (actual - expected));
  console.log('[SUDOKU] ELO: myR=', myR, 'oppR=', oppR, 'expected=', expected.toFixed(3),
    'actual=', actual, 'delta=', delta);
  let msg = '';
  // ВАЖНО: обновляем ТОЛЬКО СВОЙ рейтинг — каждый игрок сам считает свой delta.
  // В ELO delta_A = -delta_B, поэтому если оба игрока обновят только себя,
  // получится ровно нужный zero-sum.
  // delta УЖЕ содержит правильный знак для self: положительный при победе, отрицательный при поражении.
  try {
    await window.FB.upsertRating(delta, null, null);
    if (result === 'win') msg = `🎉 Победа! +${delta} рейтинга`;
    else if (result === 'lose') msg = `💔 Поражение! -${Math.abs(delta)} рейтинга`;
    else if (result === 'quit_win') msg = `🎉 Соперник сдался! +${delta} рейтинга`;
    else msg = `💔 Ты сдался! -${Math.abs(delta)} рейтинга`;
  } catch(e) {
    console.error('[SUDOKU] upsertRating failed:', e);
    msg = isWin ? `🎉 Победа! (+${delta} рейтинга, запись в базу ошибка)` : `💔 Поражение! (-${Math.abs(delta)} рейтинга, запись в базу ошибка)`;
  }

  // delta уже содержит правильный знак для self
  const myNewR = myR + delta;

  const modal = $('modalContent');
  modal.innerHTML = `
    <div class="duel-modal-step">
      <h2>${msg}</h2>
      <div class="modal-sub">Твой рейтинг: ${myNewR} (${delta >= 0 ? '+' : ''}${delta})</div>
      <div class="modal-actions">
        <button class="btn primary" id="duelEndNewBtn">⚔️ Ещё дуэль</button>
        <button class="btn ghost" id="duelEndHomeBtn">🏠 В меню</button>
      </div>
    </div>
  `;
  showModal();
  const newBtn = $('duelEndNewBtn');
  const homeBtn = $('duelEndHomeBtn');
  console.log('[SUDOKU] endDuelGame: newBtn=', newBtn, 'homeBtn=', homeBtn);
  if (newBtn) newBtn.addEventListener('click', () => { hideModal(); showDuelMenu(); });
  if (homeBtn) homeBtn.addEventListener('click', () => { hideModal(); showLevelScreen(); });

  duelCode = null;
}

// Применяет данные комнаты: инициализация или sync
console.log('[SUDOKU] _applyDuelRoom определена');
let _duelApplied = false; // guard: не применяем twice
let _duelEnded = false;   // guard: не показываем результат twice
let _duelFirstMoveDone = false; // показываем ошибки только после первого хода
function _applyDuelRoom(room) {
  // Защита: если уже инициализированы — только обновляем HUD, не пересоздаём DOM
  const myUid = window.FB.getMyUid();
  const isP1 = room.player1_uid === myUid;
  const firstTime = !_duelApplied;

  console.log('[SUDOKU] _applyDuelRoom:', firstTime ? 'FIRST' : 'SYNC',
    'solution=', room.solution ? 'есть' : 'NULL!',
    'board=', room.board ? 'есть(' + room.board.length + ')' : 'NULL!',
    'puzzle=', room.puzzle ? 'есть' : 'NULL!');

  if (firstTime) {
    _duelApplied = true;
    console.log('[SUDOKU] _applyDuelRoom(firstTime): myUid=', myUid, 'room.p1=', room.player1_uid, 'room.p2=', room.player2_uid);
    duelPuzzle = parseBoard(room.puzzle) || room.puzzle;
    duelSolution = parseBoard(room.solution) || room.solution;
    if (!duelSolution) {
      // solution не пришла с Supabase — берём из board (если board == puzzle в начале,
      // значит ходов ещё не было и board по сути = puzzle = частично заполненный)
      console.warn('[SUDOKU] solution отсутствует в Supabase! Берём из board.');
      duelSolution = parseBoard(room.board);
    }
    if (!duelSolution) console.error('[SUDOKU] _applyDuelRoom: duelSolution ВСЁ ЕЩЁ NULL!');
    duelPlayer = isP1 ? 'p1' : 'p2';
    duelOppUid = isP1 ? room.player2_uid : room.player1_uid;
    duelOppName = isP1 ? room.player2_name : room.player1_name;
    duelMyRating = isP1 ? Number(room.player1_rating || 1000) : Number(room.player2_rating || 1000);
    duelOppRating = isP1 ? Number(room.player2_rating || 1000) : Number(room.player1_rating || 1000);
    duelBoard = parseBoard(room.board) || parseBoard(room.puzzle) || (room.puzzle ? room.puzzle.map(r => r.slice()) : null);
    duelMyCorrect = Number(isP1 ? (room.player1_correct || 0) : (room.player2_correct || 0));
    duelOppCorrect = Number(isP1 ? (room.player2_correct || 0) : (room.player1_correct || 0));
    const myErr = Number(isP1 ? (room.player1_errors || 0) : (room.player2_errors || 0));
    const oppErr = Number(isP1 ? (room.player2_errors || 0) : (room.player1_errors || 0));
    duelMyLives = Math.max(0, 3 - myErr);
    duelOppLives = Math.max(0, 3 - oppErr);
    console.log('[SUDOKU] _applyDuelRoom: myLives=', duelMyLives, 'oppLives=', duelOppLives,
      'myCorrect=', duelMyCorrect, 'oppCorrect=', duelOppCorrect,
      'duelSolution=', duelSolution ? 'есть' : 'NULL!',
      'duelPuzzle=', duelPuzzle ? 'есть' : 'NULL!',
      'duelBoard=', duelBoard ? 'есть' : 'NULL!');

    renderDuelBoard();
    renderDuelNumPad();
    startDuelTimer();
    updateDuelHUD(room);
    updatePencilBtn(); // обновить кнопку карандаша (сбросить если была активна)
    updateDuelPencilBtn();
  } else {
    // Sync: обновляем lives и opponent's ходы в DOM без пересоздания доски
    duelMyCorrect = Number(isP1 ? (room.player1_correct || 0) : (room.player2_correct || 0));
    duelOppCorrect = Number(isP1 ? (room.player2_correct || 0) : (room.player1_correct || 0));
    const myErr = Number(isP1 ? (room.player1_errors || 0) : (room.player2_errors || 0));
    const oppErr = Number(isP1 ? (room.player2_errors || 0) : (room.player1_errors || 0));
    duelMyLives = Math.max(0, 3 - myErr);
    duelOppLives = Math.max(0, 3 - oppErr);
    // Парсим board из Supabase если пришёл
    const newBoard = parseBoard(room.board);
    if (newBoard) {
      duelBoard = newBoard;
      console.log('[SUDOKU] SYNC: duelBoard обновлён:', duelBoard.map(r=>r.join('')).join('|'));
    }
    updateDuelHUD(room);
    syncDuelBoardDOM();
  }
}

async function initDuelGame(code, initialRoomData) {
  console.log('[SUDOKU] initDuelGame вызван с кодом', code, 'via initDuelGame');
  // Защита: если мы уже в другой игре — игнорируем второй вызов
  if (duelCode && duelCode !== code) {
    console.log('[SUDOKU] initDuelGame: уже в игре', duelCode, ', пропускаем', code);
    return;
  }
  _duelApplied = false;
  _duelFirstMoveDone = false;
  duelCode = code;
  duelMyLives = 3; duelOppLives = 3;
  duelMyCorrect = 0; duelOppCorrect = 0;
  duelSelected = null;
  duelPuzzle = null; duelSolution = null; duelBoard = null;
  duelPlayer = null;

  $('levelScreen').classList.add('hidden');
  $('gameScreen').classList.add('hidden');
  $('duelScreen').classList.remove('hidden');

          // Приоритет: переданные данные > localStorage > polling
          // Для creator: localStorage может быть пуст если joiner ещё не записал — ждём до 2 сек
  let roomData = initialRoomData;
  if (!roomData) {
    const localRaw = localStorage.getItem('sudoku_room_' + code);
    roomData = localRaw ? JSON.parse(localRaw) : null;
    if (!roomData) {
      for (let i = 0; i < 8; i++) {
        await new Promise(r => setTimeout(r, 250));
        const retry = localStorage.getItem('sudoku_room_' + code);
        if (retry) { roomData = JSON.parse(retry); break; }
      }
    }
  }
  console.log('[SUDOKU] initDuelGame:', code,
    'initial=', initialRoomData ? 'есть' : 'нет',
    'roomData=', roomData ? 'есть' : 'нет',
    'puzzle=', roomData && roomData.puzzle ? 'есть' : 'НЕТ',
    'solution=', roomData && roomData.solution ? 'есть' : 'НЕТ');
  // Унифицированный колбэк: всегда один watchDuelRoom
  const duelCallback = room => {
    if (!room) return;
    if (room.status === 'waiting' && !room.player2_uid) { updateDuelHUD(room); return; }
    // HUD обновляется при ЛЮБОМ обновлении комнаты (жизни, очки, opponent info)
    if (room.puzzle) {
      if (!_duelApplied || !_duelEnded) {
        _applyDuelRoom(room);
      }
    }
    // Обработка конца игры — работает даже если _duelEnded уже true
    if (!_duelEnded && (room.status === 'p1_won' || room.status === 'p2_won')) {
      const iWon = (room.status === 'p1_won' && duelPlayer === 'p1') || (room.status === 'p2_won' && duelPlayer === 'p2');
      console.log('[SUDOKU] game end detected! status=', room.status, 'duelPlayer=', duelPlayer, 'iWon=', iWon);
      endDuelGame(iWon ? 'win' : 'lose');
    } else if (!_duelEnded && (room.status === 'p1_quit' || room.status === 'p2_quit')) {
      console.log('[SUDOKU] quit detected! status=', room.status, 'duelPlayer=', duelPlayer);
      const oppQuit = (room.status === 'p1_quit' && duelPlayer === 'p2') || (room.status === 'p2_quit' && duelPlayer === 'p1');
      console.log('[SUDOKU] oppQuit=', oppQuit, '-> calling endDuelGame');
      endDuelGame(oppQuit ? 'quit_win' : 'lose');
    }
  };

  if (roomData && roomData.puzzle && roomData.player1_uid && roomData.player2_uid && roomData.status === 'playing') {
    // Есть данные сразу (localStorage или переданные) — применяем и начинаем следить
    _applyDuelRoom(roomData);
    duelUnsub = window.FB.watchDuelRoom(code, duelCallback);
    return;
  }

  // Нет данных — показываем ожидание и ждём через polling
  const board = $('duelBoard');
  board.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-dim);font-size:1.1rem;">⏳ Ожидание соперника...</div>';
  $('duelNumPad').innerHTML = '';
  duelUnsub = window.FB.watchDuelRoom(code, duelCallback);
}

function renderDuelNumPad() {
  const pad = $('duelNumPad');
  pad.innerHTML = '';
  for (let n = 1; n <= 9; n++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.innerHTML = `<span class="num-digit">${n}</span><span class="num-remaining" id="duelNumRemain${n}"></span>`;
    btn.dataset.n = n;
    updateDuelNumRemaining(n, btn);
    btn.addEventListener('click', () => { playClick(); duelPlaceNumber(n); });
    pad.appendChild(btn);
  }
}

function updateDuelNumRemaining(n, btn) {
  const el = btn.querySelector('.num-remaining') || document.getElementById('duelNumRemain' + n);
  if (!el) return;
  let placed = 0;
  if (duelBoard && duelSolution) {
    for (let r = 0; r < 9; r++)
      for (let c = 0; c < 9; c++)
        if (duelBoard[r][c] === n && duelSolution[r][c] === n) placed++;
  }
  const remaining = 9 - placed;
  el.textContent = remaining > 0 ? remaining : '✓';
  if (remaining === 0) el.classList.add('done');
  else el.classList.remove('done');
}

// Dukальный таймер для дуэли
let duelTimerInterval = null;
let duelStartTime = 0;

function startDuelTimer() {
  duelStartTime = Date.now();
  const el = document.getElementById('duelTimer') || createDuelTimerEl();
  clearInterval(duelTimerInterval);
  duelTimerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - duelStartTime) / 1000);
    const m = String(Math.floor(elapsed / 60)).padStart(2,'0');
    const s = String(elapsed % 60).padStart(2,'0');
    el.textContent = `${m}:${s}`;
  }, 1000);
}

function stopDuelTimer() {
  clearInterval(duelTimerInterval);
}

function createDuelTimerEl() {

  el.id = 'duelTimer';

  $('duelScreen').querySelector('.duel-header')?.prepend(el);

}

    </div>
  `;
  showModal();
  $('duelCancelMatchBtn').addEventListener('click', () => {
    window.FB.leaveQueue();
    hideModal();
    showDuelMenu();
    if (onCleanup) onCleanup();
  });

  // Единственный вызов joinQueue — здесь, один раз
  window.FB.joinQueue(name, duelMyRating, (roomCode, roomData) => {
    console.log('[SUDOKU] auto-match: нашли соперника, комната', roomCode);
    forceHideModal();
    initDuelGame(roomCode, roomData);
    if (onCleanup) onCleanup();
  });
}

// === РЕЙТИНГ ДУЭЛЕЙ ===
async function showDuelRatingsModal() {
  const modal = $('modalContent');
  modal.innerHTML = `
    <h2>📊 Рейтинг дуэлей</h2>
    <div class="records-loading"><div class="spinner"></div><span>Загрузка...</span></div>
  `;
  showModal();

  // Загружаем рейтинги и баны параллельно, скрываем забаненных из публичного рейтинга
  const [records, banned] = await Promise.all([
    window.FB.loadDuelRatings(),
    fetch(`${_SB_REST}/banned_users?select=uid`, { method: 'GET', headers: _SB_HDR, mode: 'cors' })
      .then(r => r.ok ? r.json() : []).catch(() => [])
  ]);
  const bannedSet = new Set(banned.map(b => b.uid));
  const visible = (records || []).filter(r => !bannedSet.has(r.uid));

  const rows = !visible || visible.length === 0
    ? `<div class="empty-state">Пока нет данных.<br>Сыграй дуэль!</div>`
    : visible.map((r, i) => {
        const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
        const isMe = r.uid === window.FB.getMyUid();
        return `<div class="record-row ${rankClass} ${isMe ? 'me-row' : ''}">
          <div class="rank">#${i+1}</div>
          <div class="name">${escapeHtml(r.name)}${isMe ? ' (ты)' : ''}</div>
          <div class="time">⭐ ${r.rating || 1000}</div>
          <div class="lvl-tag">${r.gamesPlayed || 0} игр</div>
        </div>`;
      }).join('');

  modal.innerHTML = `
    <h2>📊 Рейтинг дуэлей</h2>
    <div class="modal-sub">Топ игроков по рейтингу</div>
    <div class="records-list">${rows}</div>
    <div class="modal-actions">
      <button class="btn primary" id="duelRatingsCloseBtn">Закрыть</button>
    </div>
  `;
  $('duelRatingsCloseBtn').addEventListener('click', hideModal);
}

// Клавиатура дуэли
document.addEventListener('keydown', e => {
  if (!$('duelScreen') || $('duelScreen').classList.contains('hidden')) return;
  if (e.target.tagName === 'INPUT') return;
  if (!duelSelected) return;

  if (['1','2','3','4','5','6','7','8','9'].includes(e.key)) {
    duelPlaceNumber(parseInt(e.key, 10));
  } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') {
    duelPlaceNumber(0);
  } else if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    e.preventDefault();
    let { r, c } = duelSelected;
    if (e.key === 'ArrowUp' && r > 0) r--;
    if (e.key === 'ArrowDown' && r < 8) r++;
    if (e.key === 'ArrowLeft' && c > 0) c--;
    if (e.key === 'ArrowRight' && c < 8) c++;
    if (duelBoard[r][c] === 0) {
      duelSelected = { r, c };
      renderDuelBoard();
    }
  }
});

</script>
